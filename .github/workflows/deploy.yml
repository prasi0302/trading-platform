name: Trading Platform CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ALB_DNS: ${{ vars.ALB_DNS }}
  CF_URL: ${{ vars.CF_URL }}

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================
  # TEST STAGE
  # ============================================================
  test-market-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e libs/common && cd services/market-data && pip install -e ".[dev]" && pytest tests/ -v

  test-order:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e libs/common && cd services/order && pip install -e ".[dev]" && pytest tests/ -v

  test-portfolio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e libs/common && cd services/portfolio && pip install -e ".[dev]" && pytest tests/ -v

  test-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e libs/common && cd services/alert && pip install -e ".[dev]" && pytest tests/ -v

  test-ws-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e libs/common && cd services/ws-gateway && pip install -e . && echo "Service installs successfully"

  test-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd frontend && npm ci && npx tsc --noEmit

  # ============================================================
  # BUILD STAGE
  # ============================================================
  build-market-data:
    needs: [test-market-data]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/trading-market-data:${{ github.sha }} -f services/market-data/Dockerfile .
          docker push $ECR_REGISTRY/trading-market-data:${{ github.sha }}

  build-order:
    needs: [test-order]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/trading-order:${{ github.sha }} -f services/order/Dockerfile .
          docker push $ECR_REGISTRY/trading-order:${{ github.sha }}

  build-portfolio:
    needs: [test-portfolio]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/trading-portfolio:${{ github.sha }} -f services/portfolio/Dockerfile .
          docker push $ECR_REGISTRY/trading-portfolio:${{ github.sha }}

  build-alert:
    needs: [test-alert]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/trading-alert:${{ github.sha }} -f services/alert/Dockerfile .
          docker push $ECR_REGISTRY/trading-alert:${{ github.sha }}

  build-ws-gateway:
    needs: [test-ws-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - run: |
          docker build --platform linux/amd64 -t $ECR_REGISTRY/trading-ws-gateway:${{ github.sha }} -f services/ws-gateway/Dockerfile .
          docker push $ECR_REGISTRY/trading-ws-gateway:${{ github.sha }}

  build-ui:
    needs: [test-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: cd frontend && npm ci && npx vite build
      - run: aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET }}/ --delete

  # ============================================================
  # DEPLOY STAGE
  # ============================================================
  deploy-market-data:
    needs: [build-market-data]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          SERVICE_NAME=$(aws ecs list-services --cluster $ECS_CLUSTER --query "serviceArns[?contains(@, 'MarketData')]" --output text | xargs -I{} basename {})
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SERVICE_NAME --query 'services[0].taskDefinition' --output text)
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' | jq --arg IMG "$ECR_REGISTRY/trading-market-data:${{ github.sha }}" '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_ARN --force-new-deployment

  deploy-order:
    needs: [build-order]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          SERVICE_NAME=$(aws ecs list-services --cluster $ECS_CLUSTER --query "serviceArns[?contains(@, 'Order')]" --output text | xargs -I{} basename {})
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SERVICE_NAME --query 'services[0].taskDefinition' --output text)
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' | jq --arg IMG "$ECR_REGISTRY/trading-order:${{ github.sha }}" '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_ARN --force-new-deployment

  deploy-portfolio:
    needs: [build-portfolio]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          SERVICE_NAME=$(aws ecs list-services --cluster $ECS_CLUSTER --query "serviceArns[?contains(@, 'Portfolio')]" --output text | xargs -I{} basename {})
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SERVICE_NAME --query 'services[0].taskDefinition' --output text)
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' | jq --arg IMG "$ECR_REGISTRY/trading-portfolio:${{ github.sha }}" '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_ARN --force-new-deployment

  deploy-alert:
    needs: [build-alert]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          SERVICE_NAME=$(aws ecs list-services --cluster $ECS_CLUSTER --query "serviceArns[?contains(@, 'Alert')]" --output text | xargs -I{} basename {})
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SERVICE_NAME --query 'services[0].taskDefinition' --output text)
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' | jq --arg IMG "$ECR_REGISTRY/trading-alert:${{ github.sha }}" '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_ARN --force-new-deployment

  deploy-ws-gateway:
    needs: [build-ws-gateway]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: |
          SERVICE_NAME=$(aws ecs list-services --cluster $ECS_CLUSTER --query "serviceArns[?contains(@, 'WsGateway')]" --output text | xargs -I{} basename {})
          TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SERVICE_NAME --query 'services[0].taskDefinition' --output text)
          NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' | jq --arg IMG "$ECR_REGISTRY/trading-ws-gateway:${{ github.sha }}" '.containerDefinitions[0].image = $IMG | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)')
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service --cluster $ECS_CLUSTER --service $SERVICE_NAME --task-definition $NEW_ARN --force-new-deployment

  deploy-ui:
    needs: [build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws cloudfront create-invalidation --distribution-id ${{ vars.CF_DISTRIBUTION_ID }} --paths "/*" || true

  # ============================================================
  # VERIFY STAGE
  # ============================================================
  verify-market-data:
    needs: [deploy-market-data]
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60 && curl -sf http://${{ env.ALB_DNS }}/api/symbols || exit 1

  verify-order:
    needs: [deploy-order]
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60 && curl -sf "http://${{ env.ALB_DNS }}/api/orders?session_id=health" || exit 1

  verify-portfolio:
    needs: [deploy-portfolio]
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60 && curl -sf "http://${{ env.ALB_DNS }}/api/portfolio?session_id=health" || exit 1

  verify-alert:
    needs: [deploy-alert]
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60 && curl -sf "http://${{ env.ALB_DNS }}/api/alerts?session_id=health" || exit 1

  verify-ws-gateway:
    needs: [deploy-ws-gateway]
    runs-on: ubuntu-latest
    steps:
      - run: sleep 60 && curl -sf -o /dev/null -w "%{http_code}" "http://${{ env.ALB_DNS }}/api/symbols" || exit 1

  verify-ui:
    needs: [deploy-ui]
    runs-on: ubuntu-latest
    steps:
      - run: curl -sf ${{ env.CF_URL }}/ || exit 1

  # ============================================================
  # NOTIFY DEVOPS AGENT ON FAILURE
  # ============================================================
  notify-devops-agent:
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [build-market-data, build-order, build-portfolio, build-alert, build-ws-gateway, build-ui, verify-market-data, verify-order, verify-portfolio, verify-alert, verify-ws-gateway, verify-ui]
    runs-on: ubuntu-latest
    steps:
      - run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          INCIDENT_ID="github-run-${{ github.run_id }}"

          PAYLOAD=$(cat <<PAYLOADEOF
          {
            "eventType": "incident",
            "incidentId": "$INCIDENT_ID",
            "action": "created",
            "priority": "HIGH",
            "title": "Pipeline failed: ${{ github.workflow }} (run #${{ github.run_number }})",
            "description": "GitHub Actions workflow '${{ github.workflow }}' failed in repository ${{ github.repository }}. Commit: ${{ github.sha }}. Branch: ${{ github.ref_name }}. Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} for details.",
            "service": "trading-platform",
            "timestamp": "$TIMESTAMP",
            "data": {
              "metadata": {
                "region": "us-east-1",
                "environment": "production",
                "repository": "${{ github.repository }}",
                "run_id": "${{ github.run_id }}",
                "commit_sha": "${{ github.sha }}",
                "branch": "${{ github.ref_name }}"
              }
            }
          }
          PAYLOADEOF
          )

          # Compute HMAC signature
          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | openssl dgst -sha256 -hmac "${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}" -binary | base64)

          # Send webhook
          curl -X POST "${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: $TIMESTAMP" \
            -H "x-amzn-event-signature: $SIGNATURE" \
            -d "$PAYLOAD"

          echo "DevOps Agent investigation triggered for run ${{ github.run_id }}"
