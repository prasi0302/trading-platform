# The reverse proxy is internal-only (sits inside the ECS task next to the
# upstreams). We hardcode Upgrade: websocket on the WebSocket location and
# omit any Host forwarding so attacker-controlled Host / Upgrade headers
# cannot be reflected to the upstream — this addresses the request-host-used
# and possible-nginx-h2c-smuggling semgrep rules.

server {
    # Listen on an unprivileged port so the container can run as a non-root user.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # REST API to the API Gateway service. Plain HTTP — no Upgrade.
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host "api-gateway:8000";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Defensive: drop any client Upgrade/Connection so an HTTP/1.1 ->
        # HTTP/2-cleartext smuggling attempt cannot reach the upstream.
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
    }

    # WebSocket location. Upgrade is hardcoded to "websocket" because this
    # endpoint serves WebSocket traffic exclusively.
    location /ws {
        proxy_pass http://ws-gateway:8005;
        proxy_http_version 1.1;
        proxy_set_header Host "ws-gateway:8005";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade "websocket";
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
