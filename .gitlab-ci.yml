stages:
  - test
  - build
  - deploy
  - verify
  - rollback

variables:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "288282347955"
  ECR_REGISTRY: 288282347955.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER: TradingAppStack-TradingCluster7BA98BCF-KXNiCrjc7TOU
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

# AWS authentication via CI/CD variables (set in project settings)
# Variables: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_DEFAULT_REGION

# ============================================================
# TEST STAGE
# ============================================================
test-market-data:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e libs/common
    - cd services/market-data && pip install -e ".[dev]"
    - pytest tests/ -v --tb=short
  rules:
    - changes:
        - services/market-data/**/*
        - libs/common/**/*
    - when: always

test-order:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e libs/common
    - cd services/order && pip install -e ".[dev]"
    - pytest tests/ -v --tb=short
  rules:
    - changes:
        - services/order/**/*
        - libs/common/**/*
    - when: always

test-portfolio:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e libs/common
    - cd services/portfolio && pip install -e ".[dev]"
    - pytest tests/ -v --tb=short
  rules:
    - changes:
        - services/portfolio/**/*
        - libs/common/**/*
    - when: always

test-alert:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e libs/common
    - cd services/alert && pip install -e ".[dev]"
    - pytest tests/ -v --tb=short
  rules:
    - changes:
        - services/alert/**/*
        - libs/common/**/*
    - when: always

test-ws-gateway:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -e libs/common
    - cd services/ws-gateway && pip install -e .
    - echo "No tests yet - service starts successfully"
  rules:
    - changes:
        - services/ws-gateway/**/*
        - libs/common/**/*
    - when: always

test-ui:
  stage: test
  image: node:20-alpine
  script:
    - cd frontend && npm ci
    - npx tsc --noEmit
  rules:
    - changes:
        - frontend/**/*
    - when: always

# ============================================================
# BUILD STAGE
# ============================================================
.build_template: &build_template
  stage: build
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  services:
    - docker:24-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-24.0.9.tgz | tar xz --strip-components=1 -C /usr/local/bin docker/docker
    - docker --version
    - aws sts get-caller-identity
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
    - docker build --platform linux/amd64 -t $ECR_REGISTRY/$SERVICE_NAME:$IMAGE_TAG -t $ECR_REGISTRY/$SERVICE_NAME:latest -f services/$SERVICE_DIR/Dockerfile .
    - docker push $ECR_REGISTRY/$SERVICE_NAME:$IMAGE_TAG
    - docker push $ECR_REGISTRY/$SERVICE_NAME:latest

build-market-data:
  <<: *build_template
  variables:
    SERVICE_NAME: trading-market-data
    SERVICE_DIR: market-data

build-order:
  <<: *build_template
  variables:
    SERVICE_NAME: trading-order
    SERVICE_DIR: order

build-portfolio:
  <<: *build_template
  variables:
    SERVICE_NAME: trading-portfolio
    SERVICE_DIR: portfolio

build-alert:
  <<: *build_template
  variables:
    SERVICE_NAME: trading-alert
    SERVICE_DIR: alert

build-ws-gateway:
  <<: *build_template
  variables:
    SERVICE_NAME: trading-ws-gateway
    SERVICE_DIR: ws-gateway

build-ui:
  stage: build
  image: node:20
  before_script:
    - curl -sL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    - unzip -q /tmp/awscliv2.zip -d /tmp && /tmp/aws/install
    - aws sts get-caller-identity
  script:
    - cd frontend && npm ci && npx vite build
    - aws s3 sync dist/ s3://tradingappstack-frontendbucketefe2e19c-u9fgmkwqgbub/ --delete
  artifacts:
    paths:
      - frontend/dist/

# ============================================================
# DEPLOY STAGE
# ============================================================
.deploy_template: &deploy_template
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    - |
      TASK_DEF=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].taskDefinition' --output text)
      NEW_TASK_DEF=$(aws ecs describe-task-definition --task-definition $TASK_DEF --query 'taskDefinition' --output json |
        jq --arg IMAGE "$ECR_REGISTRY/$SERVICE_NAME:$IMAGE_TAG" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
      NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
      aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $NEW_TASK_ARN --force-new-deployment
    - echo "Deployed $SERVICE_NAME with image tag $IMAGE_TAG"

deploy-market-data:
  <<: *deploy_template
  variables:
    SERVICE_NAME: trading-market-data
    ECS_SERVICE: TradingAppStack-MarketDataServiceE5B2BA03

deploy-order:
  <<: *deploy_template
  variables:
    SERVICE_NAME: trading-order
    ECS_SERVICE: TradingAppStack-OrderServiceC448479E

deploy-portfolio:
  <<: *deploy_template
  variables:
    SERVICE_NAME: trading-portfolio
    ECS_SERVICE: TradingAppStack-PortfolioServiceD49F49E3

deploy-alert:
  <<: *deploy_template
  variables:
    SERVICE_NAME: trading-alert
    ECS_SERVICE: TradingAppStack-AlertServiceA8D8D244

deploy-ws-gateway:
  <<: *deploy_template
  variables:
    SERVICE_NAME: trading-ws-gateway
    ECS_SERVICE: TradingAppStack-WsGatewayServiceE53031B4

deploy-ui:
  stage: deploy
  image: amazon/aws-cli:latest
  script:
    - aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"
  variables:
    CF_DISTRIBUTION_ID: E1EXAMPLE  # Will be updated with actual ID

# ============================================================
# VERIFY STAGE
# ============================================================
.verify_template: &verify_template
  stage: verify
  image: curlimages/curl:latest
  script:
    - sleep 30
    - |
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_DNS$HEALTH_PATH")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "✅ $SERVICE_NAME health check passed (HTTP $HTTP_CODE)"
      else
        echo "❌ $SERVICE_NAME health check failed (HTTP $HTTP_CODE)"
        exit 1
      fi
  variables:
    ALB_DNS: Tradin-Tradi-VNtUgZp6acFf-284746681.us-east-1.elb.amazonaws.com

verify-market-data:
  <<: *verify_template
  variables:
    SERVICE_NAME: market-data
    HEALTH_PATH: /api/symbols

verify-order:
  <<: *verify_template
  variables:
    SERVICE_NAME: order
    HEALTH_PATH: /api/orders?session_id=health-check

verify-portfolio:
  <<: *verify_template
  variables:
    SERVICE_NAME: portfolio
    HEALTH_PATH: /api/portfolio?session_id=health-check

verify-alert:
  <<: *verify_template
  variables:
    SERVICE_NAME: alert
    HEALTH_PATH: /api/alerts?session_id=health-check

verify-ws-gateway:
  <<: *verify_template
  variables:
    SERVICE_NAME: ws-gateway
    HEALTH_PATH: /health

verify-ui:
  stage: verify
  image: curlimages/curl:latest
  script:
    - |
      HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://d387q14faj9961.cloudfront.net/")
      if [ "$HTTP_CODE" = "200" ]; then
        echo "✅ Frontend health check passed"
      else
        echo "❌ Frontend health check failed (HTTP $HTTP_CODE)"
        exit 1
      fi

# ============================================================
# ROLLBACK STAGE (manual trigger only)
# ============================================================
.rollback_template: &rollback_template
  stage: rollback
  image: amazon/aws-cli:latest
  when: manual
  script:
    - |
      CURRENT_TASK=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].taskDefinition' --output text)
      PREV_REVISION=$(($(echo $CURRENT_TASK | grep -o '[0-9]*$') - 1))
      TASK_FAMILY=$(echo $CURRENT_TASK | sed 's/:[0-9]*$//')
      PREV_TASK="${TASK_FAMILY}:${PREV_REVISION}"
      aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $PREV_TASK --force-new-deployment
    - echo "⏪ Rolled back $SERVICE_NAME to previous version"

rollback-market-data:
  <<: *rollback_template
  variables:
    SERVICE_NAME: trading-market-data
    ECS_SERVICE: TradingAppStack-MarketDataServiceE5B2BA03

rollback-order:
  <<: *rollback_template
  variables:
    SERVICE_NAME: trading-order
    ECS_SERVICE: TradingAppStack-OrderServiceC448479E

rollback-portfolio:
  <<: *rollback_template
  variables:
    SERVICE_NAME: trading-portfolio
    ECS_SERVICE: TradingAppStack-PortfolioServiceD49F49E3

rollback-alert:
  <<: *rollback_template
  variables:
    SERVICE_NAME: trading-alert
    ECS_SERVICE: TradingAppStack-AlertServiceA8D8D244

rollback-ws-gateway:
  <<: *rollback_template
  variables:
    SERVICE_NAME: trading-ws-gateway
    ECS_SERVICE: TradingAppStack-WsGatewayServiceE53031B4

rollback-ui:
  stage: rollback
  image: amazon/aws-cli:latest
  when: manual
  script:
    - echo "⏪ UI rollback - redeploy previous frontend build from S3 versioning"
